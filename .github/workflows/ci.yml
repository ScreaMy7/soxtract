name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest hatchling && pip install -e .

      - name: Run tests
        run: pytest tests/ -v

  build-agent:
    name: Build Frida agent
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        run: |
          cd agent
          npm ci
          npm run build

      - name: Verify agent.js matches committed copy
        run: |
          diff agent/dist/agent.js soxtract/agent.js || \
            (echo "soxtract/agent.js is out of date — run: cd agent && npm run build && cp dist/agent.js ../soxtract/agent.js" && exit 1)
